# agent_config.yaml
# Centralized configuration for AI Agents (Antigravity/Cursor/Claude Code)
# Agents MUST read this file before scaffolding Phase 0 or generating SQL assets.

gcp_connection:
  # Replaces <PROJECT> and <YOUR_GCP_PROJECT_ID>
  project_id: "your-gcp-project-id-here"
  
  # Replaces <PATH_TO_SERVICE_ACCOUNT_JSON>
  service_account_file: "/absolute/path/to/your/service-account.json"

bruin_pipeline:
  name: "de-pipeline"
  # The BigQuery dataset where the tables/models will be created (e.g., <PROJECT>.de_pipeline)
  dataset_name: "de_pipeline"
  schedule: "daily"

source_data:
  # The GA4 public dataset we are querying from 
  # Used in 1_staging/stg_events_flat.sql
  ga4_source_table: "bigquery-public-data.ga4_obfuscated_sample_ecommerce.events_*"
